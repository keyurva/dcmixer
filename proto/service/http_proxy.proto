syntax = "proto3";

package datacommons;

option go_package = "github.com/datacommonsorg/mixer/internal/proto/service";

import "google/api/annotations.proto";
import "google/api/httpbody.proto";

service HttpProxyService {
  // Generic RPC to proxy HTTP requests to external backends.
  rpc HttpProxy(google.api.HttpBody) returns (google.api.HttpBody) {
    option (google.api.http) = {
      get: "/mcp"
      additional_bindings: {
        post: "/mcp"
        body: "*"
      }
      additional_bindings: {
        get: "/mixer-mcp"
      }
      additional_bindings: {
        post: "/mixer-mcp"
        body: "*"
      }
    };
  }
}
